<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Botanica — Mon Panier</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Google Tag Manager -->
  <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
  new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
  j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
  'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
  })(window,document,'script','dataLayer','GTM-KVKN64XD');</script>
  <!-- End Google Tag Manager -->

  <style>
    :root {
      --cream: #f7f3ed;
      --green: #2d4a2d;
      --green-light: #4a7c4a;
      --gold: #c4a882;
      --dark: #1a1a18;
      --text: #3a3a35;
      --border: #e0d8cc;
      --error: #c0392b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--text);
    }

    nav {
      background: var(--cream);
      border-bottom: 1px solid var(--border);
      padding: 0 60px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: 4px;
      color: var(--green);
      text-decoration: none;
    }

    .back-btn {
      font-size: 0.78rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
      transition: color 0.2s;
    }

    .back-btn:hover { color: var(--green); }

    /* MAIN LAYOUT */
    .cart-layout {
      display: grid;
      grid-template-columns: 1fr 420px;
      gap: 0;
      min-height: calc(100vh - 64px);
    }

    /* CART ITEMS */
    .cart-main {
      padding: 60px;
      border-right: 1px solid var(--border);
    }

    .cart-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.5rem;
      font-weight: 300;
      margin-bottom: 8px;
    }

    .cart-subtitle { font-size: 0.82rem; color: #aaa; margin-bottom: 48px; }

    /* STEPPER */
    .stepper {
      display: flex;
      align-items: center;
      margin-bottom: 48px;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    .step-num {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.78rem;
      transition: all 0.3s;
    }

    .step.active .step-num,
    .step.done .step-num {
      background: var(--green);
      color: white;
      border-color: var(--green);
    }

    .step-label {
      font-size: 0.78rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #aaa;
      transition: color 0.3s;
    }

    .step.active .step-label { color: var(--green); font-weight: 500; }
    .step.done .step-label { color: var(--text); }

    .step-line {
      flex: 1;
      height: 1px;
      background: var(--border);
      margin: 0 20px;
      position: relative;
    }

    .step-line::after {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      background: var(--green);
      width: 0%;
      transition: width 0.5s;
    }

    .step-line.done::after { width: 100%; }

    /* STEP CONTENTS */
    .step-content { display: none; }
    .step-content.active { display: block; }

    /* CART ITEMS LIST */
    .cart-items { margin-bottom: 32px; }

    .cart-item {
      display: grid;
      grid-template-columns: 60px 1fr auto;
      gap: 20px;
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
      align-items: center;
    }

    .cart-item-emoji {
      font-size: 2.5rem;
      background: white;
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cart-item-name { font-size: 0.9rem; font-weight: 500; margin-bottom: 4px; }
    .cart-item-cat { font-size: 0.75rem; color: #aaa; margin-bottom: 10px; }

    .cart-item-qty {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .qty-btn-small {
      width: 24px;
      height: 24px;
      border: 1px solid var(--border);
      background: none;
      cursor: pointer;
      font-size: 0.8rem;
    }

    .qty-num { font-size: 0.85rem; width: 24px; text-align: center; }

    .cart-item-price {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem;
      text-align: right;
    }

    .remove-btn {
      display: block;
      font-size: 0.7rem;
      color: #ccc;
      cursor: pointer;
      text-align: right;
      margin-top: 4px;
      background: none;
      border: none;
      text-decoration: underline;
    }

    .remove-btn:hover { color: var(--error); }

    .empty-cart {
      text-align: center;
      padding: 80px 0;
      color: #aaa;
    }

    .empty-cart .emoji { font-size: 4rem; margin-bottom: 16px; }
    .empty-cart p { font-size: 0.9rem; margin-bottom: 24px; }
    .empty-cart a {
      color: var(--green);
      text-decoration: none;
      font-size: 0.8rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-bottom: 1px solid var(--green);
    }

    /* FORMS */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }

    .form-label {
      font-size: 0.72rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #aaa;
    }

    .form-input {
      padding: 12px 16px;
      border: 1px solid var(--border);
      background: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-input:focus { border-color: var(--green); }
    .form-input.error { border-color: var(--error); }

    .form-select {
      padding: 12px 16px;
      border: 1px solid var(--border);
      background: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      outline: none;
      appearance: none;
      cursor: pointer;
    }

    /* PAYMENT */
    .payment-methods {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .payment-method {
      border: 1px solid var(--border);
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .payment-method.selected {
      border-color: var(--green);
      background: rgba(45,74,45,0.04);
    }

    .payment-method-icon { font-size: 1.5rem; margin-bottom: 6px; }
    .payment-method-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1px; }

    .nav-btns {
      display: flex;
      gap: 12px;
      margin-top: 32px;
    }

    .btn-back {
      padding: 14px 28px;
      background: none;
      border: 1px solid var(--border);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-back:hover { border-color: var(--green); color: var(--green); }

    .btn-next {
      flex: 1;
      padding: 14px;
      background: var(--green);
      color: white;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-next:hover { background: var(--green-light); }

    /* ORDER SUMMARY */
    .cart-summary {
      padding: 60px 40px;
      background: white;
      position: sticky;
      top: 0;
      align-self: start;
    }

    .summary-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 300;
      margin-bottom: 32px;
    }

    .summary-line {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
    }

    .summary-line:last-child { border: none; }

    .summary-total {
      display: flex;
      justify-content: space-between;
      padding: 20px 0;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
    }

    .promo-block {
      margin: 24px 0;
    }

    .promo-form { display: flex; gap: 0; }

    .promo-input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-right: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      outline: none;
      text-transform: uppercase;
    }

    .promo-btn {
      padding: 12px 20px;
      background: var(--dark);
      color: white;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 1px;
      cursor: pointer;
    }

    .promo-success {
      font-size: 0.78rem;
      color: var(--green);
      margin-top: 8px;
      display: none;
    }

    .secure-badges {
      display: flex;
      gap: 16px;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    .secure-badge {
      font-size: 0.7rem;
      color: #aaa;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: var(--dark);
      color: white;
      padding: 16px 24px;
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 999;
      border-left: 3px solid var(--gold);
    }

    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KVKN64XD"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

<nav>
  <a href="index.html" class="logo">BOTANICA</a>
  <a href="index.html" class="back-btn">← Continuer mes achats</a>
</nav>

<div class="cart-layout">

  <!-- MAIN -->
  <div class="cart-main">
    <h1 class="cart-title">Mon Panier</h1>
    <p class="cart-subtitle" id="cart-subtitle">Chargement...</p>

    <!-- STEPPER -->
    <div class="stepper">
      <div class="step active" id="step-1" onclick="goToStep(1)">
        <div class="step-num">1</div>
        <div class="step-label">Panier</div>
      </div>
      <div class="step-line" id="line-1"></div>
      <div class="step" id="step-2" onclick="goToStep(2)">
        <div class="step-num">2</div>
        <div class="step-label">Livraison</div>
      </div>
      <div class="step-line" id="line-2"></div>
      <div class="step" id="step-3" onclick="goToStep(3)">
        <div class="step-num">3</div>
        <div class="step-label">Paiement</div>
      </div>
    </div>

    <!-- STEP 1 — CART -->
    <div class="step-content active" id="content-1">
      <div class="cart-items" id="cart-items-list"></div>
      <div class="nav-btns">
        <button class="btn-next" onclick="nextStep(2)">Continuer → Livraison</button>
      </div>
    </div>

    <!-- STEP 2 — LIVRAISON -->
    <div class="step-content" id="content-2">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Prénom</label>
          <input class="form-input" type="text" id="f-prenom" placeholder="Marie">
        </div>
        <div class="form-group">
          <label class="form-label">Nom</label>
          <input class="form-input" type="text" id="f-nom" placeholder="Dupont">
        </div>
        <div class="form-group full">
          <label class="form-label">Adresse</label>
          <input class="form-input" type="text" id="f-adresse" placeholder="12 rue des Fleurs">
        </div>
        <div class="form-group">
          <label class="form-label">Code postal</label>
          <input class="form-input" type="text" id="f-cp" placeholder="75001">
        </div>
        <div class="form-group">
          <label class="form-label">Ville</label>
          <input class="form-input" type="text" id="f-ville" placeholder="Paris">
        </div>
        <div class="form-group full">
          <label class="form-label">Pays</label>
          <select class="form-input form-select" id="f-pays">
            <option>France</option>
            <option>Belgique</option>
            <option>Suisse</option>
            <option>Luxembourg</option>
          </select>
        </div>
        <div class="form-group full">
          <label class="form-label">Email de confirmation</label>
          <input class="form-input" type="email" id="f-email" placeholder="marie@email.com">
        </div>
      </div>
      <div class="nav-btns">
        <button class="btn-back" onclick="prevStep(1)">← Retour</button>
        <button class="btn-next" onclick="nextStep(3)">Continuer → Paiement</button>
      </div>
    </div>

    <!-- STEP 3 — PAIEMENT -->
    <div class="step-content" id="content-3">
      <div class="payment-methods">
        <div class="payment-method selected" onclick="selectPayment(this, 'card')">
          <div class="payment-method-icon">💳</div>
          <div class="payment-method-label">Carte</div>
        </div>
        <div class="payment-method" onclick="selectPayment(this, 'paypal')">
          <div class="payment-method-icon">🅿️</div>
          <div class="payment-method-label">PayPal</div>
        </div>
        <div class="payment-method" onclick="selectPayment(this, 'apple_pay')">
          <div class="payment-method-icon">🍎</div>
          <div class="payment-method-label">Apple Pay</div>
        </div>
      </div>

      <div class="form-grid" id="card-form">
        <div class="form-group full">
          <label class="form-label">Numéro de carte</label>
          <input class="form-input" type="text" placeholder="1234 5678 9012 3456" maxlength="19" id="card-num">
        </div>
        <div class="form-group">
          <label class="form-label">Date d'expiration</label>
          <input class="form-input" type="text" placeholder="MM/AA" maxlength="5" id="card-exp">
        </div>
        <div class="form-group">
          <label class="form-label">CVV</label>
          <input class="form-input" type="text" placeholder="123" maxlength="3" id="card-cvv">
        </div>
        <div class="form-group full">
          <label class="form-label">Nom sur la carte</label>
          <input class="form-input" type="text" placeholder="MARIE DUPONT" id="card-name">
        </div>
      </div>

      <div class="nav-btns">
        <button class="btn-back" onclick="prevStep(2)">← Retour</button>
        <button class="btn-next" onclick="placeOrder()">✓ Confirmer la commande</button>
      </div>
    </div>

  </div>

  <!-- SUMMARY -->
  <div class="cart-summary">
    <div class="summary-title">Récapitulatif</div>
    <div id="summary-items"></div>

    <div class="promo-block">
      <div class="promo-form">
        <input class="promo-input" type="text" id="promo-input" placeholder="CODE PROMO">
        <button class="promo-btn" onclick="applyPromo()">Appliquer</button>
      </div>
      <div class="promo-success" id="promo-success">✓ Code appliqué — −10%</div>
    </div>

    <div class="summary-line">
      <span>Sous-total</span>
      <span id="subtotal">0,00 €</span>
    </div>
    <div class="summary-line">
      <span>Livraison</span>
      <span id="shipping">Gratuite</span>
    </div>
    <div class="summary-line" id="discount-line" style="display:none; color:var(--green)">
      <span>Réduction (−10%)</span>
      <span id="discount-amount">0,00 €</span>
    </div>
    <div class="summary-total">
      <span>Total</span>
      <span id="total">0,00 €</span>
    </div>

    <div class="secure-badges">
      <div class="secure-badge">🔒 Paiement sécurisé</div>
      <div class="secure-badge">↩️ Retours gratuits</div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  const emojis = { SKU001:'🌹', SKU002:'🫐', SKU003:'🌾', SKU004:'🌰', SKU005:'🍋', SKU006:'🌼' };
  let cart = JSON.parse(localStorage.getItem('botanica_cart') || '[]');
  let currentStep = 1;
  let promoApplied = false;
  let selectedPayment = 'card';

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function fmt(n) { return n.toFixed(2).replace('.', ',') + ' €'; }

  function renderCart() {
    const list = document.getElementById('cart-items-list');
    const total = cart.reduce((s, i) => s + i.price * i.qty, 0);

    if (cart.length === 0) {
      list.innerHTML = `<div class="empty-cart">
        <div class="emoji">🛒</div>
        <p>Votre panier est vide</p>
        <a href="index.html">Découvrir nos produits</a>
      </div>`;
      document.getElementById('cart-subtitle').textContent = '0 article';
    } else {
      document.getElementById('cart-subtitle').textContent = cart.length + ' article(s)';
      list.innerHTML = cart.map(item => `
        <div class="cart-item">
          <div class="cart-item-emoji">${emojis[item.id] || '🌿'}</div>
          <div>
            <div class="cart-item-name">${item.name}</div>
            <div class="cart-item-cat">${item.category}</div>
            <div class="cart-item-qty">
              <button class="qty-btn-small" onclick="changeQty('${item.id}', -1)">−</button>
              <span class="qty-num">${item.qty}</span>
              <button class="qty-btn-small" onclick="changeQty('${item.id}', 1)">+</button>
            </div>
          </div>
          <div>
            <div class="cart-item-price">${fmt(item.price * item.qty)}</div>
            <button class="remove-btn" onclick="removeItem('${item.id}')">Supprimer</button>
          </div>
        </div>
      `).join('');
    }

    renderSummary(total);
  }

  function renderSummary(total) {
    const discount = promoApplied ? total * 0.1 : 0;
    const finalTotal = total - discount;

    document.getElementById('summary-items').innerHTML = cart.map(i =>
      `<div class="summary-line"><span>${i.name} ×${i.qty}</span><span>${fmt(i.price * i.qty)}</span></div>`
    ).join('');

    document.getElementById('subtotal').textContent = fmt(total);
    document.getElementById('total').textContent = fmt(finalTotal);

    if (promoApplied) {
      document.getElementById('discount-line').style.display = 'flex';
      document.getElementById('discount-amount').textContent = '−' + fmt(discount);
    }
  }

  function changeQty(id, delta) {
    const item = cart.find(i => i.id === id);
    if (!item) return;
    item.qty = Math.max(1, item.qty + delta);
    localStorage.setItem('botanica_cart', JSON.stringify(cart));

    window.dataLayer = window.dataLayer || [];
    window.dataLayer.push({ event: 'cart_quantity_change', product_id: id, quantity: item.qty });
    renderCart();
  }

  function removeItem(id) {
    const item = cart.find(i => i.id === id);
    window.dataLayer = window.dataLayer || [];
    window.dataLayer.push({ event: 'remove_from_cart', product_id: id, product_name: item?.name });
    cart = cart.filter(i => i.id !== id);
    localStorage.setItem('botanica_cart', JSON.stringify(cart));
    renderCart();
  }

  function applyPromo() {
    const code = document.getElementById('promo-input').value.toUpperCase();
    if (code === 'BOTANICA10') {
      promoApplied = true;
      document.getElementById('promo-success').style.display = 'block';
      const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
      renderSummary(total);
      window.dataLayer = window.dataLayer || [];
      window.dataLayer.push({ event: 'promo_applied', promo_code: code, discount: '10%' });
    } else {
      showToast('Code invalide');
      window.dataLayer = window.dataLayer || [];
      window.dataLayer.push({ event: 'promo_failed', promo_code: code });
    }
  }

  function selectPayment(el, method) {
    document.querySelectorAll('.payment-method').forEach(m => m.classList.remove('selected'));
    el.classList.add('selected');
    selectedPayment = method;
    window.dataLayer = window.dataLayer || [];
    window.dataLayer.push({ event: 'payment_method_select', payment_method: method });
  }

  // ——— STEPPER ———
  function goToStep(n) {
    if (n > currentStep) return; // can't jump ahead
    currentStep = n;
    updateStepper();
  }

  function nextStep(n) {
    // Validate step 2
    if (n === 3) {
      const required = ['f-prenom', 'f-nom', 'f-adresse', 'f-cp', 'f-ville', 'f-email'];
      let valid = true;
      required.forEach(id => {
        const el = document.getElementById(id);
        if (!el.value.trim()) { el.classList.add('error'); valid = false; }
        else el.classList.remove('error');
      });
      if (!valid) { showToast('Veuillez remplir tous les champs'); return; }

      window.dataLayer = window.dataLayer || [];
      window.dataLayer.push({
        event: 'checkout_step_complete',
        step: 2,
        step_name: 'livraison',
        country: document.getElementById('f-pays').value
      });
    }

    if (n === 2 && cart.length === 0) { showToast('Votre panier est vide'); return; }

    currentStep = n;
    updateStepper();

    window.dataLayer = window.dataLayer || [];
    window.dataLayer.push({ event: 'checkout_step_view', step: n, step_name: ['', 'panier', 'livraison', 'paiement'][n] });
  }

  function prevStep(n) {
    currentStep = n;
    updateStepper();
  }

  function updateStepper() {
    for (let i = 1; i <= 3; i++) {
      const step = document.getElementById('step-' + i);
      const content = document.getElementById('content-' + i);
      step.className = 'step' + (i === currentStep ? ' active' : i < currentStep ? ' done' : '');
      content.className = 'step-content' + (i === currentStep ? ' active' : '');
    }
    for (let i = 1; i <= 2; i++) {
      const line = document.getElementById('line-' + i);
      line.className = 'step-line' + (i < currentStep ? ' done' : '');
    }
  }

  function placeOrder() {
    const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
    const discount = promoApplied ? total * 0.1 : 0;

    window.dataLayer = window.dataLayer || [];
    window.dataLayer.push({
      event: 'purchase',
      transaction_id: 'TXN' + Date.now(),
      value: (total - discount).toFixed(2),
      currency: 'EUR',
      payment_method: selectedPayment,
      promo_applied: promoApplied,
      items: cart.map(i => ({ item_id: i.id, item_name: i.name, price: i.price, quantity: i.qty }))
    });

    localStorage.removeItem('botanica_cart');
    window.location.href = 'confirmation.html?total=' + (total - discount).toFixed(2);
  }

  // ——— INIT ———
  renderCart();

  window.dataLayer = window.dataLayer || [];
  window.dataLayer.push({
    event: 'view_cart',
    cart_value: cart.reduce((s, i) => s + i.price * i.qty, 0),
    cart_items: cart.length
  });
</script>

</body>
</html>
